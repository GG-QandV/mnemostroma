<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mnemostroma</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      min-width: 280px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #0f172a;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #1e293b;
    }
    .header svg { flex-shrink: 0; }
    .header-title { font-size: 14px; font-weight: 600; color: #f1f5f9; }

    /* ── Status ── */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green  { background: #22c55e; }
    .status-dot.yellow { background: #eab308; }
    .status-dot.red    { background: #ef4444; }
    .status-text { color: #94a3b8; }

    /* ── MCP warning ── */
    .mcp-warning {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 14px;
      background: #1e1a0e;
      border-bottom: 1px solid #292219;
      font-size: 11px;
      color: #fbbf24;
      line-height: 1.5;
    }
    .mcp-warning.visible { display: flex; }
    .mcp-warning a {
      color: #fbbf24;
      text-decoration: underline;
      cursor: pointer;
    }

    /* ── Section ── */
    .section { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      margin-bottom: 8px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      user-select: none;
    }
    .toggle-label { color: #cbd5e1; }
    .toggle-label.muted { color: #64748b; }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 34px; height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: #334155;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked   + .toggle-track { background: #22c55e; }
    .toggle input:disabled  + .toggle-track { opacity: 0.4; cursor: not-allowed; }
    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      font-size: 11px;
      color: #475569;
    }
    .footer a { color: #475569; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }

    /* ── Tunnel section ── */
    .hidden { display: none !important; }

    .btn-primary {
      width: 100%;
      padding: 6px 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .btn-primary:hover { background: #4338ca; }

    .btn-small {
      padding: 3px 7px;
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    .btn-small:hover { background: #334155; }
    .btn-danger { border-color: #ef4444; color: #ef4444; }
    .btn-danger:hover { background: #450a0a; }

    .tunnel-hint { font-size: 11px; color: #475569; margin-top: 5px; text-align: center; }

    .tunnel-url-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .tunnel-url-text {
      flex: 1;
      font-size: 11px;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-row { margin-bottom: 8px; }
    .chat-label { font-size: 12px; color: #e2e8f0; margin-bottom: 2px; }
    .chat-url-text {
      font-size: 10px;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 3px;
    }
    .chat-actions { display: flex; gap: 4px; margin-bottom: 2px; }
    .chat-hint { font-size: 10px; color: #475569; }

    .copy-hint { font-size: 11px; color: #22c55e; margin-top: 4px; text-align: center; }
    .tunnel-error { font-size: 11px; color: #fca5a5; padding: 4px 8px; background: rgba(220,38,38,0.15); border-radius: 4px; margin-top: 4px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tunnel Ring ── */
    .icon-wrapper {
      position: relative;
      display: inline-block;
      width: 20px;
      height: 20px;
      overflow: visible;
    }
    .tunnel-ring {
      position: absolute;
      inset: -3px;           /* 3px зазор вокруг иконки */
      border-radius: 50%;
      border: 2px solid transparent;
      pointer-events: none;
      transition: border-color 0.4s ease;
      box-sizing: border-box;
    }
    /* Туннель активен — зелёный */
    .tunnel-ring.active {
      border-color: #22c55e;
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }
    /* Туннель стартует или завис — жёлтый, пульсирует */
    .tunnel-ring.stale {
      border-color: #eab308;
      animation: pulse-ring 1.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    /* Для Windows HiDPI — чуть тоньше ободок */
    @media (-webkit-min-device-pixel-ratio: 1.25) {
      .tunnel-ring {
        inset: -2px;
        border-width: 1.5px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="icon-wrapper">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="9" stroke="#6366f1" stroke-width="1.5"/>
        <circle cx="10" cy="10" r="3" fill="#6366f1"/>
        <path d="M10 1v3M10 16v3M1 10h3M16 10h3" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M3.5 3.5l2 2M14.5 14.5l2 2M3.5 16.5l2-2M14.5 5.5l2-2" stroke="#6366f1" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div id="tunnel-ring" class="tunnel-ring"></div>
    </div>
    <span class="header-title">Mnemostroma</span>
    <span id="version" style="margin-left:auto;font-size:11px;color:#475569;"></span>
  </div>

  <!-- Daemon status -->
  <div class="status">
    <div class="status-dot yellow" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking…</span>
  </div>

  <!-- MCP warning -->
  <div class="mcp-warning" id="mcp-warning">
    <span>⚠</span>
    <span>MCP not detected.
      <a id="mcp-link"
         href="https://github.com/mnemostroma/extension/blob/main/docs/SETUP-MCP.md"
         target="_blank">How to connect →</a>
    </span>
  </div>

  <!-- Capture toggle -->
  <div class="section">
    <div class="section-label">Capture</div>
    <div class="toggle-row">
      <span class="toggle-label">Global capture</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-global" aria-label="Global capture">
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <!-- Per-site toggles -->
  <div class="section">
    <div class="section-label">Sites</div>
    <div id="sites-list"></div>
  </div>

  <!-- Tunnel -->
  <div class="section" id="tunnel-section" aria-label="Tunnel status">
    <div class="section-label">🌐 Tunnel</div>

    <!-- STOPPED -->
    <div id="tunnel-stopped">
      <button id="btn-start-tunnel" class="btn-primary">▶ Start Tunnel</button>
      <p class="tunnel-hint">Connect Claude · ChatGPT · Perplexity · Grok</p>
    </div>

    <!-- STARTING (polling) -->
    <div id="tunnel-starting" class="hidden" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span><span>Starting tunnel…</span>
    </div>

    <!-- RUNNING -->
    <div id="tunnel-running" class="hidden">
      <div class="tunnel-url-row">
        <span id="tunnel-url-display" class="tunnel-url-text" title=""></span>
        <button id="btn-copy-tunnel-url" class="btn-small" title="Copy tunnel URL">📋</button>
        <button id="btn-stop-tunnel" class="btn-small btn-danger" title="Stop tunnel">⏹</button>
      </div>
      <div id="tunnel-chats-container"></div>
      <div id="copy-hint" class="copy-hint hidden" role="status" aria-live="polite"></div>
    </div>

    <!-- Error banner (hidden by default) -->
    <div id="tunnel-error" class="tunnel-error hidden" role="alert" aria-live="assertive"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>v<span id="footer-version">—</span></span>
    <a href="https://github.com/GG-QandV/mnemostroma"
       target="_blank">mnemostroma</a>
    <a id="docs-link"
       href="https://github.com/mnemostroma/extension#readme"
       target="_blank">docs</a>
    <a href="https://github.com/mnemostroma/extension/issues"
       target="_blank">report issue</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
